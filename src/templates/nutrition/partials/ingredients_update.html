{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body>
    <form method="post" class="col-md-6 col-lg-4 mb-4">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-outline-danger btn-sm">Modifier l'ingrédient</button>
    <a href="{% url 'nutrition:ingredients_list' %}"
       class="btn btn-outline-primary btn-sm">Retour à la liste des ingrédients</a>
    </form>
</body>
</html>
